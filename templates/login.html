{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin    : 0;
            padding   : 0;
            box-sizing: border-box;
        }

        body {
            font-family     : 'Plus Jakarta Sans', sans-serif;
            background-color: #F8F8F8;
            min-height      : 100vh;
            display         : flex;
            align-items     : center;
            justify-content : center;
            position        : relative;
            overflow        : hidden;
        }

        /* Background glows */
        .glow-left {
            position  : absolute;
            top       : 0;
            left      : 0;
            width     : 500px;
            height    : 500px;
            background: radial-gradient(circle, rgba(250,204,21,0.15) 0%, transparent 70%);
            z-index   : 0;
        }

        .glow-right {
            position  : absolute;
            bottom    : 0;
            right     : 0;
            width     : 500px;
            height    : 500px;
            background: radial-gradient(circle, rgba(56,189,248,0.1) 0%, transparent 70%);
            z-index   : 0;
        }

        /* Login Card */
        .login-card {
            background   : white;
            border-radius: 32px;
            padding      : 50px 40px;
            width        : 100%;
            max-width    : 420px;
            box-shadow   : 0 20px 60px rgba(0,0,0,0.08);
            border       : 1px solid #E5E5E5;
            position     : relative;
            z-index      : 1;
        }

        /* Logo */
        .login-logo {
            display        : flex;
            align-items    : center;
            justify-content: center;
            gap            : 10px;
            margin-bottom  : 32px;
        }

        .logo-icon {
            width          : 48px;
            height         : 48px;
            background     : #18181B;
            border-radius  : 12px;
            display        : flex;
            align-items    : center;
            justify-content: center;
            color          : #FACC15;
            font-size      : 1.3rem;
        }

        .logo-text {
            font-size  : 1.3rem;
            font-weight: 800;
            color      : #1C1D20;
        }

        /* Title */
        .login-title {
            font-size    : 1.8rem;
            font-weight  : 800;
            color        : #1C1D20;
            margin-bottom: 8px;
            text-align   : center;
        }

        .login-subtitle {
            color        : #71717A;
            font-size    : 0.9rem;
            text-align   : center;
            margin-bottom: 32px;
        }

        /* Messages */
        .message {
            padding      : 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size    : 0.85rem;
            font-weight  : 500;
            display      : flex;
            align-items  : center;
            gap          : 8px;
        }

        .message.success {
            background: #f0fdf4;
            border    : 1px solid #22c55e;
            color     : #16a34a;
        }

        .message.error {
            background: #fef2f2;
            border    : 1px solid #ef4444;
            color     : #dc2626;
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display      : block;
            font-size    : 0.85rem;
            font-weight  : 600;
            color        : #1C1D20;
            margin-bottom: 8px;
        }

        .form-input-wrapper {
            position: relative;
        }

        .form-input-wrapper i {
            position : absolute;
            left     : 14px;
            top      : 50%;
            transform: translateY(-50%);
            color    : #A1A1AA;
            font-size: 0.9rem;
        }

        .form-input {
            width        : 100%;
            padding      : 12px 16px 12px 40px;
            border       : 1px solid #E5E5E5;
            border-radius: 10px;
            font-family  : 'Plus Jakarta Sans', sans-serif;
            font-size    : 0.9rem;
            color        : #1C1D20;
            background   : #F8F8F8;
            transition   : all 0.3s ease;
            outline      : none;
        }

        .form-input:focus {
            border-color: #FACC15;
            background  : white;
            box-shadow  : 0 0 0 3px rgba(250,204,21,0.15);
        }

        /* Login Button */
        .login-btn {
            width          : 100%;
            padding        : 14px;
            background     : #18181B;
            color          : white;
            border         : none;
            border-radius  : 50px;
            font-family    : 'Plus Jakarta Sans', sans-serif;
            font-size      : 0.95rem;
            font-weight    : 600;
            cursor         : pointer;
            transition     : all 0.3s ease;
            display        : flex;
            align-items    : center;
            justify-content: center;
            gap            : 10px;
            margin-top     : 8px;
        }

        .login-btn:hover {
            opacity  : 0.85;
            transform: translateY(-2px);
        }

        .yellow-arrow {
            background     : #FACC15;
            width          : 32px;
            height         : 32px;
            border-radius  : 8px;
            display        : flex;
            align-items    : center;
            justify-content: center;
            color          : black;
        }

        /* Footer */
        .login-footer {
            text-align : center;
            margin-top : 24px;
            color      : #71717A;
            font-size  : 0.8rem;
        }
    </style>
</head>
<body>

    <div class="glow-left"></div>
    <div class="glow-right"></div>

    <div class="login-card">

        <!-- Logo -->
        <div class="login-logo">
            <div class="logo-icon">
                <i class="fas fa-code"></i>
            </div>
            <span class="logo-text">Portfolio</span>
        </div>

        <!-- Title -->
        <h1 class="login-title">Welcome Back!</h1>
        <p class="login-subtitle">
            Login to view your portfolio
        </p>

        <!-- Messages -->
        {% if messages %}
        {% for message in messages %}
        <div class="message {{ message.tags }}">
            {% if message.tags == 'success' %}
            <i class="fas fa-check-circle"></i>
            {% else %}
            <i class="fas fa-exclamation-circle"></i>
            {% endif %}
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}

        <!-- Login Form -->
        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label class="form-label">Username</label>
                <div class="form-input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text"
                           name="username"
                           class="form-input"
                           placeholder="Enter your username"
                           required
                           autocomplete="username">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="form-input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password"
                           name="password"
                           class="form-input"
                           placeholder="Enter your password"
                           required
                           autocomplete="current-password">
                </div>
            </div>

            <button type="submit" class="login-btn">
                Login to Portfolio
                <span class="yellow-arrow">
                    <i class="fas fa-arrow-right"></i>
                </span>
            </button>
        </form>

        <!-- Footer -->
        <div class="login-footer">
            <p>Dynamic Portfolio System © 2025</p>
        </div>

    </div>

</body>
</html>
